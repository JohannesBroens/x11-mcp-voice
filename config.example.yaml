# x11-mcp-voice configuration
# Copy to config.yaml and edit as needed.
# All values shown are defaults — only override what you want to change.

wake_word:
  model: "hey_nox"              # "hey_nox" (custom) or "hey_jarvis" (default openwakeword)
  threshold: 0.5                # detection confidence (0.0-1.0)

stt:
  model: "nvidia/parakeet-tdt-0.6b-v2"
  device: "cuda"                # "cuda" or "cpu"

tts:
  engine: "kokoro"              # "kokoro" (neural, natural) or "piper" (lightweight, robotic)
  voice: "af_heart"             # Default: best quality female voice (see options below)
  speed: 1.0
  # Available Kokoro voices (prefix = gender + accent):
  #   af_ = American female, am_ = American male
  #   bf_ = British female,  bm_ = British male
  #
  # Female American:
  #   af_heart (A)     — warm, clear, best quality (default)
  #   af_bella (A-)    — soft, expressive
  #   af_sarah         — neutral, professional
  #   af_nova          — bright, energetic
  #   af_sky           — light, airy
  #   af_nicole        — calm, measured
  #
  # Female British:
  #   bf_emma          — classic British RP
  #   bf_isabella      — warm, conversational
  #   bf_alice         — clear, precise
  #   bf_lily          — gentle, soft-spoken
  #
  # Male American:
  #   am_adam          — deep, authoritative
  #   am_michael       — friendly, natural
  #   am_liam          — young, casual
  #
  # Male British:
  #   bm_george        — classic British male
  #   bm_daniel        — warm, measured
  #   bm_fable         — storyteller quality
  #
  # Grade indicates voice quality: A = best training data, A- = very good
  # For Piper engine: use e.g. "en_US-ryan-medium" or "en_US-lessac-medium"

media:
  auto_pause: true              # pause media on wake, resume when done
  player: null                  # null = any active MPRIS player, or e.g. "youtube-music"

agent:
  model: "claude-sonnet-4-6"    # Claude model (uses your Claude Code subscription)

audio:
  sample_rate: 16000            # Hz (don't change — Parakeet expects 16kHz)
  silence_threshold_ms: 500     # ms of silence to stop recording
  max_recording_s: 30           # max seconds per utterance
  vad_threshold: 0.6            # Silero VAD speech probability (0.0-1.0, higher = less noise)
  min_speech_s: 0.5             # minimum recording duration to accept (seconds)
  input_device: null            # null = system default, or device index/name
  output_device: null           # null = system default, or device index/name

conversation:
  style: "auto"                 # "auto" | "confirmations" | "walkie_talkie"
  followup_timeout_question_s: 5.0    # when Nox asks you a question
  followup_timeout_statement_s: 2.0   # when Nox makes a statement
  session_timeout_s: 300              # reset conversation after 5 min idle
  proofread: false                    # show transcription for editing before sending

chat:
  text_input: false             # enable text input via input socket (used by 'nox send')

service:
  autostart: false            # enable systemd autostart on install
  chat_autostart: true        # open chat window minimized on login (default: on)
  socket_path: null           # default: /run/user/{uid}/nox.sock
  log_file: null              # default: ~/.local/log/nox/daemon.log
